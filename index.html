<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    getDoc,
    onSnapshot,
    enableIndexedDbPersistence
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 YOUR FIREBASE CONFIG (UPDATED)
  const firebaseConfig = {
    apiKey: "AIzaSyDcUTLDn9FJC...",
    authDomain: "mylifehub-1a716.firebaseapp.com",
    projectId: "mylifehub-1a716",
    storageBucket: "mylifehub-1a716.firebasestorage.app",
    messagingSenderId: "296758857362",
    appId: "1:296758857362:web:ff818b6d3639fab56e604b",
    measurementId: "G-VMGZLTWHYF"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);

  // Analytics (optional but safe)
  const analytics = getAnalytics(app);

  // Firestore database
  const db = getFirestore(app);

  // Enable offline mode (VERY IMPORTANT)
  enableIndexedDbPersistence(db).catch((err) => {
    console.log("Offline persistence error:", err);
  });

  // Make globally available for your app
  window.db = db;
  window.firestore = {
    collection,
    doc,
    setDoc,
    getDoc,
    onSnapshot
  };

  // Sync status UI
  document.addEventListener("DOMContentLoaded", () => {
    const statusEl = document.getElementById("sync-status");

    statusEl.innerHTML = '<i data-lucide="cloud"></i> Firebase Ready';
    statusEl.classList.add("online");
    statusEl.classList.remove("offline");

    lucide.createIcons();
  });
</script>
